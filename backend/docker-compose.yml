version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_research
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
